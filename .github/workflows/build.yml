name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller defect_detection.spec
        shell: cmd

      - name: Bundle VC++ runtime DLLs
        run: |
          Write-Host "Searching for VC++ CRT DLLs..."
          $dlls = Get-ChildItem "C:\Program Files (x86)\Microsoft Visual Studio" -Recurse -Filter "vcruntime140.dll" -ErrorAction SilentlyContinue
          if (-Not $dlls) {
            $dlls = Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "vcruntime140.dll" -ErrorAction SilentlyContinue
          }
          if (-Not $dlls) {
            Write-Host "Searching Windows System32..."
            $sysDll = "C:\Windows\System32\vcruntime140.dll"
            if (Test-Path $sysDll) {
              Copy-Item $sysDll dist\DefectDetection\
              Copy-Item "C:\Windows\System32\vcruntime140_1.dll" dist\DefectDetection\
              Copy-Item "C:\Windows\System32\msvcp140.dll" dist\DefectDetection\
              Write-Host "Copied from System32"
            } else {
              Write-Warning "No VC++ runtime DLLs found, skipping"
            }
          } else {
            $crtDir = $dlls[0].DirectoryName
            Write-Host "Found CRT at: $crtDir"
            Copy-Item "$crtDir\vcruntime140.dll" dist\DefectDetection\
            Copy-Item "$crtDir\vcruntime140_1.dll" dist\DefectDetection\ -ErrorAction SilentlyContinue
            Copy-Item "$crtDir\msvcp140.dll" dist\DefectDetection\ -ErrorAction SilentlyContinue
          }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: DefectDetection-Windows
          path: dist/DefectDetection/
          retention-days: 30
