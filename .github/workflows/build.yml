name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller defect_detection.spec
        shell: cmd

      - name: Bundle VC++ runtime DLLs
        run: |
          $vcDir = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC"
          if (-Not (Test-Path $vcDir)) {
            $vcDir = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\Community\VC\Redist\MSVC"
          }
          $dllDir = Get-ChildItem "$vcDir\*\x64\Microsoft.VC143.CRT" -ErrorAction Stop | Select-Object -Last 1
          Write-Host "Copying VC++ CRT from: $($dllDir.FullName)"
          Copy-Item "$($dllDir.FullName)\vcruntime140.dll" dist\DefectDetection\
          Copy-Item "$($dllDir.FullName)\vcruntime140_1.dll" dist\DefectDetection\
          Copy-Item "$($dllDir.FullName)\msvcp140.dll" dist\DefectDetection\
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: DefectDetection-Windows
          path: dist/DefectDetection/
          retention-days: 30
